<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Markdown 测试</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { font-family: -apple-system; padding: 20px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 8px; }
    th { background: #f5f5f5; }
    h2 { color: #333; border-bottom: 2px solid #007AFF; padding-bottom: 8px; }
  </style>
</head>
<body>
  <h1>Markdown 渲染测试</h1>
  <div id="output"></div>
  <script>
    const markdown = `## 📊 公司基本面

蘋果公司是全球領先的科技公司。

## 💰 財務表現

| 指標 | 數值 | 評價 |
|------|------|------|
| 營收 | 394.3億 | ✅ 穩定增長 |
| 淨利 | 99.8億 | ✅ 高利潤率 |

## ✅ 投資建議

**結論：** 買入
**目標價：** $180`;

    console.log('marked 加载状态:', typeof marked);
    document.getElementById('output').innerHTML = marked.parse(markdown);
  </script>
</body>
</html>
