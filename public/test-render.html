<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>渲染测试</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { font-family: -apple-system; padding: 20px; max-width: 600px; margin: 0 auto; }
    table { width: 100%; border-collapse: collapse; margin: 12px 0; }
    th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
    th { background: #f5f5f5; }
    h2 { color: #333; border-bottom: 2px solid #007AFF; padding-bottom: 4px; }
    h3 { color: #333; }
  </style>
</head>
<body>
  <h1>渲染测试</h1>
  <div id="output"></div>
  
  <script>
    // 从 index.html 复制的 renderMarkdown 函数
    function renderMarkdown(text) {
      if (typeof marked !== 'undefined') {
        try {
          return marked.parse(text);
        } catch(e) {
          console.error('marked error:', e);
        }
      }
      
      let html = text;
      const tableRegex = /\|(.*)\|\n\|[-\s|]+\|\n((?:\|.*\|\n?)+)/g;
      html = html.replace(tableRegex, (match, header, rows) => {
        const headers = header.split('|').filter(h => h.trim()).map(h => `<th>${h.trim()}</th>`).join('');
        const rowsHtml = rows.trim().split('\n').map(row => {
          const cells = row.split('|').filter(c => c.trim()).map(c => `<td>${c.trim()}</td>`).join('');
          return `<tr>${cells}</tr>`;
        }).join('');
        return `<table><thead><tr>${headers}</tr></thead><tbody>${rowsHtml}</tbody></table>`;
      });
      
      html = html.replace(/## (.*)/g, '<h2>$1</h2>');
      html = html.replace(/### (.*)/g, '<h3>$1</h3>');
      html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/^- (.*)$/gm, '<li>$1</li>');
      html = html.replace(/---/g, '<hr>');
      html = html.replace(/\n/g, '<br>');
      
      return html;
    }

    // 测试内容
    const testContent = `## 🎯 買賣信號分析

### 📊 綜合評分

| 項目 | 評分 | 說明 |
|------|------|------|
| 技術面 | ⭐⭐⭐⭐ | 看好 |
| 基本面 | ⭐⭐⭐⭐ | 良好 |

### ✅ 操作結論

**當前建議：** 買入

---`;

    console.log('marked 加载状态:', typeof marked);
    document.getElementById('output').innerHTML = renderMarkdown(testContent);
  </script>
</body>
</html>
